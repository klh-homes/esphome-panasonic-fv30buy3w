esphome:
  name: !secret device_name
  friendly_name: !secret friendly_name

esp32:
  board: nodemcu-32s
  framework:
    type: arduino

logger:

web_server:

api:

ota:
  platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

external_components:
  - source:
      type: local
      path: components

time:
  - platform: homeassistant
    id: ha_time

panasonic_fv30buy3w:
  pin: 23
  time_id: ha_time

select:
  - platform: panasonic_fv30buy3w
    mode:
      id: fan_mode
      name: "Fan Mode"

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"
      entity_category: diagnostic
  - platform: panasonic_fv30buy3w
    timer_expires:
      id: timer_expires
      name: "Timer Expires"
      device_class: timestamp

binary_sensor:
  - platform: panasonic_fv30buy3w
    host_connection:
      id: host_connection
      name: "Host Connection"
      device_class: connectivity

sensor:
  - platform: uptime
    name: "Uptime"
    entity_category: diagnostic
    unit_of_measurement: "h"
    accuracy_decimals: 1
    filters:
      - lambda: return x / 3600.0;
  - platform: wifi_signal
    name: "WiFi Signal"
    entity_category: diagnostic

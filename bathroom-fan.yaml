esphome:
  name: secondary-bathroom-fan
  friendly_name: Secondary Bathroom Fan

esp32:
  board: nodemcu-32s
  framework:
    type: arduino

logger:

web_server:

api:

ota:
  platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

external_components:
  - source:
      type: local
      path: components

panasonic_fv30buy3w:
  pin: 23

select:
  - platform: panasonic_fv30buy3w
    mode:
      id: fan_mode
      name: "Fan Mode"
    timer:
      id: fan_timer
      name: "Fan Timer"

text_sensor:
  - platform: panasonic_fv30buy3w
    host_timer:
      id: host_timer
      name: "Host Timer"
    host_connection:
      id: host_connection
      name: "Host Connection"
